services:
  web:
    container_name: ${WEB_HOST}
    image: ${WEB_IMAGE_NAME}:${WEB_IMAGE_TAG}
    build:
      context: ./
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "${WEB_PORT:-80}:8069"
    env_file:
      - .env
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ${WEB_ADDONS_CUSTOMIZE:-/srv/odoo/addons/19.0}:/mnt/extra-addons:ro
      - ${WEB_ADDONS_L10NPY:-/srv/odoo/addons/l10n_py/v19}:/mnt/extra-addons-l10n:ro
      - ./migracion:/mnt/migracion
    command: >
      bash -c "pip3 install --break-system-packages tu-ruc-python-client &&
      odoo --addons-path=/mnt/extra-addons,/mnt/extra-addons-l10n,/usr/lib/python3/dist-packages/odoo/addons
      --db_host=${DB_HOST} --db_port=${DB_PORT} --db_user=${DB_USER} --db_password=${DB_PASSWORD}"
    environment:
      - HOST=${DB_HOST}
      - USER=${DB_USER}
      - PASSWORD=${DB_PASSWD}
      - PGHOST=${DB_HOST}
      - PGPORT=5432
      - PGDATABASE=${DB_NAME}
      - PGPASSWORD=${DB_PASSWD}
      - TZ=${TZ:-America/Asuncion}
      - DEBIAN_FRONTEND=noninteractive
    restart: unless-stopped
    networks:
      - default
      - traefik-public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/database/selector"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  db:
    container_name: ${DB_HOST}
    image: ${DB_IMAGE}:${DB_TAG}
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWD}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=${TZ:-America/Asuncion}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  init:
    container_name: odoo_init_db_19
    image: ${WEB_IMAGE_NAME}:${WEB_IMAGE_TAG}
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ${WEB_ADDONS_CUSTOMIZE:-/srv/odoo/addons/19.0}:/mnt/extra-addons:ro
      - ${WEB_ADDONS_L10NPY:-/srv/odoo/addons/l10n_py/v19}:/mnt/extra-addons-l10n:ro
      - ./init_prod_db.sh:/init_prod_db.sh:ro
      - ./modules.conf:/modules.conf:ro
      - ./migracion:/mnt/migracion
    environment:
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWD=${DB_PASSWD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - IMPORT_RECIPES=${IMPORT_RECIPES:-false}
      - IMPORT_PRODUCTS=${IMPORT_PRODUCTS:-false}
    command: >
      bash -c "
        pip3 install --break-system-packages tu-ruc-python-client 2>/dev/null || true &&
        bash /init_prod_db.sh &&
        touch /tmp/init_completed
      "
    restart: "no"

volumes:
  odoo-db-data:
    driver: local
    driver_opts:
      type: none
      device: ${DB_VOLUMES}
      o: bind
  odoo-web-data:
    driver: local
    driver_opts:
      type: none
      device: ${WEB_VOLUMES}
      o: bind

networks:
  default:
    driver: bridge
  traefik-public:
    external: true
